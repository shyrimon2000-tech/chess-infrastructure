apiVersion: v1
kind: Secret
metadata:
  name: ghcr-secret
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "ghcr.io": {
          "username": "<your-github-username>",
          "password": "<your-ghcr-pat>",
          "auth": ""
        }
      }
    }
