apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth-networkpolicy
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: chess-auth-service
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
      podSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: auth-db
    ports:
    - protocol: TCP
      port: 3306