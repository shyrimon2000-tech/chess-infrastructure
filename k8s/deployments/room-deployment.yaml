apiVersion: apps/v1
kind: Deployment
metadata:
  name: room-deployment
  labels:
    app: chess-room-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chess-room-service
  template:
    metadata:
      labels:
        app: chess-room-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
      - name: chess-room-service
        image: ghcr.io/shyrimon2000-tech/chess-room-service:1.0.0
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: room-secret
        - configMapRef:
            name: room-configmap
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 5