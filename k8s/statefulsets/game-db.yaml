apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: game-db
spec:
  serviceName: game-db-service
  replicas: 1
  selector:
    matchLabels:
      app: game-db
  template:
    metadata:
      labels:
        app: game-db
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
        envFrom:
        - secretRef:
            name: game-db-secret
        volumeMounts:
        - name: game-db-data
          mountPath: /var/lib/mysql
  volumeClaimTemplates:
  - metadata:
      name: game-db-data
    spec:
      storageClassName: ""
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi