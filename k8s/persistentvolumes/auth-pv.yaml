apiVersion: v1
kind: PersistentVolume
metadata:
  name: auth-pv
  labels:
    pv: auth-pv
spec:
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: db-group
          operator: In
          values:
          - group-1
  storageClassName: ""
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/mnt/data/auth-db"
  claimRef:
    namespace: default
    name: auth-db-data-auth-db-0