apiVersion: v1
kind: PersistentVolume
metadata:
  name: game-pv
  labels:
    pv: game-pv
spec:
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: db-group
          operator: In
          values:
          - group-2
  storageClassName: ""
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/mnt/data/game-db"
  claimRef:
    namespace: default
    name: game-db-data-game-db-0