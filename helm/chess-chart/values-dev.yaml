ingress:
  host: "dev.chess.internal"

resourcequota:
  hard:
    requests.cpu: "1300m"
    requests.memory: "2900Mi"
    limits.cpu: "2700m"
    limits.memory: "4200Mi"

frontend:
  enabled: true

secret:
  dockerconfigjson: |
    {
      "auths": {
        "ghcr.io": {
          "username": "",
          "password": "",
          "auth": ""
        }
      }
    }

auth:
  secret:
    databaseUrl: ""
    jwtSecretKey: ""
  db:
    storageClassName: gp3
    hostPath:
      enabled: false
    secret:
      rootPassword: ""
      password: ""

room:
  replicaCount: 1
  secret:
    databaseUrl: ""
    redisUrl: ""
    jwtSecretKey: ""
  db:
    storageClassName: gp3
    hostPath:
      enabled: false
    secret:
      rootPassword: ""
      password: ""

game:
  replicaCount: 1
  secret:
    databaseUrl: ""
    redisUrl: ""
    jwtSecretKey: ""
  db:
    storageClassName: gp3
    hostPath:
      enabled: false
    secret:
      rootPassword: ""
      password: ""

redis:
  storageClassName: gp3
  hostPath:
    enabled: false
