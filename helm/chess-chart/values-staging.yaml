ingress:
  host: "staging.chess.internal"

resourcequota:
  hard:
    requests.cpu: "3100m"
    requests.memory: "5000Mi"
    limits.cpu: "6500m"
    limits.memory: "8200Mi"

frontend:
  enabled: true

secret:
  dockerconfigjson: |
    {
      "auths": {
        "ghcr.io": {
          "username": "",
          "password": "",
          "auth": ""
        }
      }
    }

auth:
  hpa:
    enabled: true
  secret:
    databaseUrl: ""
    jwtSecretKey: ""
  db:
    storageClassName: gp3
    hostPath:
      enabled: false
    secret:
      rootPassword: ""
      password: ""

room:
  hpa:
    enabled: true
  secret:
    databaseUrl: ""
    redisUrl: ""
    jwtSecretKey: ""
  db:
    storageClassName: gp3
    hostPath:
      enabled: false
    secret:
      rootPassword: ""
      password: ""

game:
  hpa:
    enabled: true
  secret:
    databaseUrl: ""
    redisUrl: ""
    jwtSecretKey: ""
  db:
    storageClassName: gp3
    hostPath:
      enabled: false
    secret:
      rootPassword: ""
      password: ""

redis:
  storageClassName: gp3
  hostPath:
    enabled: false
