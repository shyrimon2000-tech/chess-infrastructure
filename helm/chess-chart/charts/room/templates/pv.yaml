{{- if .Values.db.hostPath.enabled }}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: room-pv
  labels:
    pv: room-pv
spec:
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: db-group
          operator: In
          values:
          - {{ .Values.db.nodeGroup }}
  storageClassName: ""
  capacity:
    storage: {{ .Values.db.storage }}
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "{{ .Values.db.hostPath.path }}"
  claimRef:
    namespace: {{ .Release.Namespace }}
    name: room-db-data-room-db-0
  {{- end }}