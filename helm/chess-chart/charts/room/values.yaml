image:
  repository: ghcr.io/shyrimon2000-tech/chess-room-service
  tag: "1.0.0"

replicaCount: 2

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 65

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

initContainer:
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "150m"
      memory: "256Mi"

config:
  jwtAlgorithm: HS256
  accessTokenExpireMinutes: "30"
  refreshTokenExpireDays: "7"

secret:
  databaseUrl: ""
  redisUrl: ""
  jwtSecretKey: ""

db:
  enabled: true
  storageClassName: ""
  image: mysql:8.0
  resources:
    requests:
      cpu: "200m"
      memory: "600Mi"
    limits:
      cpu: "400m"
      memory: "800Mi"
  secret:
    rootPassword: ""
    user: chess_user
    password: ""
    database: room_db
  storage: 1Gi
  nodeGroup: group-1
  hostPath:
    enabled: true
    path: /mnt/data/room-db
