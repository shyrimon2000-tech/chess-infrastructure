apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth-networkpolicy
spec:
  podSelector:
    matchLabels:
      app: chess-auth-service
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
      podSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  egress:
  {{- if .Values.db.enabled }}
  - to:
    - podSelector:
        matchLabels:
          app: auth-db
    ports:
    - protocol: TCP
      port: 3306
  {{- else }}
  - to:
    - ipBlock:
        cidr: {{ .Values.db.cidr }}
    ports:
    - protocol: TCP
      port: 3306
  {{- end }}
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
