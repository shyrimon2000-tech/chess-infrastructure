apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: chess-frontend-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: chess-frontend-service
  template:
    metadata:
      labels:
        app: chess-frontend-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
      - name: chess-frontend-service
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 5
        resources:
          {{- toYaml .Values.resources | nindent 10 }}