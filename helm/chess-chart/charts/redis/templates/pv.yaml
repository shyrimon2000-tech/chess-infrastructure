{{- if .Values.hostPath.enabled }}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: redis-pv
  labels:
    pv: redis-pv
spec:
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: db-group
          operator: In
          values:
          - {{ .Values.nodeGroup }}
  storageClassName: ""
  capacity:
    storage: {{ .Values.storage }}
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "{{ .Values.hostPath.path }}"
  claimRef:
    namespace: {{ .Release.Namespace }}
    name: redis-data-redis-0
  {{- end }}