image:
  repository: ghcr.io/shyrimon2000-tech/chess-game-service
  tag: "1.0.0"

replicaCount: 3

hpa:
  enabled: false
  minReplicas: 3
  maxReplicas: 6
  targetCPUUtilizationPercentage: 60

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

initContainer:
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "150m"
      memory: "256Mi"

config:
  jwtAlgorithm: HS256
  accessTokenExpireMinutes: "30"
  refreshTokenExpireDays: "7"

externalSecret:
  refreshInterval: 1h
  secretStoreRef:
    name: cluster-secret-store
    kind: ClusterSecretStore
  remoteRef:
    key: ""

secret:
  enabled: true
  databaseUrl: ""
  redisUrl: ""
  jwtSecretKey: ""

db:
  enabled: true
  storageClassName: ""
  image: mysql:8.0
  resources:
    requests:
      cpu: "200m"
      memory: "600Mi"
    limits:
      cpu: "400m"
      memory: "800Mi"
  externalSecret:
    refreshInterval: 1h
    secretStoreRef:
      name: cluster-secret-store
      kind: ClusterSecretStore
    remoteRef:
      key: ""
  secret:
    enabled: true
    rootPassword: ""
    user: chess_user
    password: ""
    database: game_db
  storage: 1Gi
  nodeGroup: group-2
  hostPath:
    enabled: true
    path: /mnt/data/game-db
