secret:
  enabled: true  
  dockerconfigjson: |
      {
        "auths": {
          "ghcr.io": {
            "username": "<your-github-username>",
            "password": "<your-ghcr-pat>",
            "auth": ""
          }
        }
      }
  externalSecret:
    refreshInterval: 1h
    secretStoreRef:
      name: cluster-secret-store
      kind: ClusterSecretStore
    remoteRef:
      key: ""

ingress:
  host: ""
  nginx:
    enabled: true
    annotations:
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/rewrite-target: /$1
  alb:
    enabled: false
    host: ""
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
    # Separate ALB listener for game's /ws/games path, deliberately without
    # mutual-authentication - CloudFront can't do WebSocket through an
    # origin with origin mTLS enabled (AWS-documented limitation, found
    # live in prod). See README Troubleshooting and game-ws-ingress.yaml.
    wsAnnotations: {}

resourcequota:
  hard:
    requests.cpu: "2180m"
    requests.memory: "4100Mi"
    limits.cpu: "3650m"
    limits.memory: "5200Mi"

limitrange:
  limits:
  - default:
      cpu: "300m"
      memory: "478Mi"
    defaultRequest:
      cpu: "218m"
      memory: "410Mi"
    max:
      cpu: "1"
      memory: "1Gi"
    min:
      cpu: "50m"
      memory: "50Mi"
    type: Container

frontend:
  enabled: true

auth:
  db:
    enabled: true
    storageClassName: ""

room:
  db:
    enabled: true
    storageClassName: ""

game:
  db:
    enabled: true
    storageClassName: ""

redis:
  enabled: true
  storageClassName: ""

# Post-install/post-upgrade Helm hook Job that creates the per-service
# database/user/grant on the real RDS instance - replaces the old Terraform
# `mysql` provider approach (see README Troubleshooting). Only meaningful
# where services use RDS (prod) - dev/staging's in-cluster MySQL StatefulSets
# bootstrap their own single database via the official image's MYSQL_DATABASE
# env var, no Job needed there.
dbBootstrap:
  enabled: false
  externalSecret:
    refreshInterval: 1h
    secretStoreRef:
      name: cluster-secret-store
      kind: ClusterSecretStore
    # SSM path to the RDS master password (plain string value, not JSON) -
    # auth/room/game's own DATABASE_URL secrets are reused directly (see
    # rds-bootstrap-secret.yaml), no separate parameter needed for those.
    masterPasswordKey: ""