{{- if .Values.dbBootstrap.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rds-bootstrap-secret
spec:
  refreshInterval: {{ .Values.dbBootstrap.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.dbBootstrap.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.dbBootstrap.externalSecret.secretStoreRef.kind }}
  target:
    name: rds-bootstrap-secret
    creationPolicy: Owner
  data:
    - secretKey: ADMIN_PASSWORD
      remoteRef:
        key: {{ .Values.dbBootstrap.externalSecret.masterPasswordKey | quote }}
    # Reuses auth/room/game's own DATABASE_URL secrets directly - same SSM
    # paths already configured for their own deployments, no duplicate
    # parameter to keep in sync.
    - secretKey: AUTH_DATABASE_URL
      remoteRef:
        key: {{ .Values.auth.externalSecret.remoteRef.key | quote }}
        property: DATABASE_URL
    - secretKey: ROOM_DATABASE_URL
      remoteRef:
        key: {{ .Values.room.externalSecret.remoteRef.key | quote }}
        property: DATABASE_URL
    - secretKey: GAME_DATABASE_URL
      remoteRef:
        key: {{ .Values.game.externalSecret.remoteRef.key | quote }}
        property: DATABASE_URL
{{- end }}
