apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main-ingress
  annotations:
  {{- if .Values.ingress.nginx.enabled }}
  {{- toYaml .Values.ingress.nginx.annotations | nindent 4 }}
  {{- else if .Values.ingress.alb.enabled }}
  {{- toYaml .Values.ingress.alb.annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.nginx.enabled }}
  ingressClassName: nginx
  {{- else if .Values.ingress.alb.enabled }}
  ingressClassName: alb
  {{- end }}
  rules:
  - {{- if .Values.ingress.host }}
    host: {{ .Values.ingress.host }}
    {{- end }}
    http:
      paths:
      {{- if .Values.ingress.nginx.enabled }}
      - path: /api/rooms/(rooms.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: room-service
            port:
              number: 8000
      - path: /api/(auth/.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: auth-service
            port:
              number: 8000
      {{- else if .Values.ingress.alb.enabled }}
      # CloudFront's strip_api_prefix function (terraform/modules/frontend)
      # already removes the /api prefix before this reaches the ALB, so these
      # are plain prefix matches on the paths auth/room-service actually
      # expect — no regex, ALB path-pattern conditions don't support it.
      - path: /rooms
        pathType: Prefix
        backend:
          service:
            name: room-service
            port:
              number: 8000
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 8000
      {{- end }}
      {{- if .Values.frontend.enabled }}
      - path: /(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: frontend-service
            port:
              number: 8080
      {{- end }}