apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main-ingress
  annotations:
  {{- if .Values.ingress.nginx.enabled }}
  {{- toYaml .Values.ingress.nginx.annotations | nindent 4 }}
  {{- else if .Values.ingress.alb.enabled }}
  {{- toYaml .Values.ingress.alb.annotations | nindent 4 }}
    # Combined (AND) with each path's own match below — a request hitting
    # the right path but missing/wrong header matches no rule at all, and
    # ALB's own default-no-match behavior is a plain 404, not a forward.
    # No separate deny-all action needed for that reason.
    alb.ingress.kubernetes.io/conditions.room-service: '[{"field":"http-header","httpHeaderConfig":{"httpHeaderName":"X-Origin-Verify","values":["{{ .Values.ingress.alb.originVerifySecret }}"]}}]'
    alb.ingress.kubernetes.io/conditions.auth-service: '[{"field":"http-header","httpHeaderConfig":{"httpHeaderName":"X-Origin-Verify","values":["{{ .Values.ingress.alb.originVerifySecret }}"]}}]'
  {{- end }}
spec:
  {{- if .Values.ingress.nginx.enabled }}
  ingressClassName: nginx
  {{- else if .Values.ingress.alb.enabled }}
  ingressClassName: alb
  {{- end }}
  rules:
  - {{- if .Values.ingress.host }}
    host: {{ .Values.ingress.host }}
    {{- end }}
    http:
      paths:
      - path: /api/rooms/(rooms.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: room-service
            port:
              number: 8000
      - path: /api/(auth/.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: auth-service
            port:
              number: 8000
      {{- if .Values.frontend.enabled }}
      - path: /(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: frontend-service
            port:
              number: 8080
      {{- end }}