name: Terraform CI/CD

# plan runs on every PR into dev/main (required branch-protection check) AND
# on workflow_dispatch (as a mandatory gate immediately before apply, in the
# same run) — apply itself only ever runs on workflow_dispatch, never
# automatically on merge. This is a pet project torn down between sessions
# for cost, not always-on infra: an apply-on-merge trigger would mean every
# dev/main merge tries to (re)create a whole EKS cluster, which isn't
# wanted here.
on:
  pull_request:
    branches: [dev, main]
  workflow_dispatch: {}

permissions:
  id-token: write # required for AWS OIDC federation
  contents: read

env:
  TERRAFORM_VERSION: "1.15.7"
  TERRAGRUNT_VERSION: "1.0.8"
  AWS_REGION: "us-east-1"
  # Role ARNs only pair the account ID with a plain role name, not a personal
  # IAM username — safe to commit, unlike ADMIN_PRINCIPAL_ARN below (see
  # README's Prerequisites section for why that one stays a secret).
  SHARED_ROLE_ARN: "arn:aws:iam::221556121262:role/chess-shared-cicd"
  PROD_ROLE_ARN: "arn:aws:iam::221556121262:role/chess-prod-cicd"

jobs:
  plan:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    outputs:
      dir: ${{ steps.env.outputs.dir }}
      role_arn: ${{ steps.env.outputs.role_arn }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # pull_request: target branch is github.base_ref (github.ref_name is
      # empty for this event type). workflow_dispatch: no base_ref exists at
      # all, use github.ref_name (the branch it was dispatched from) instead.
      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            branch="${{ github.base_ref }}"
          else
            branch="${{ github.ref_name }}"
          fi

          if [ "$branch" = "dev" ]; then
            echo "dir=terraform/environments/shared" >> "$GITHUB_OUTPUT"
            echo "role_arn=${{ env.SHARED_ROLE_ARN }}" >> "$GITHUB_OUTPUT"
          elif [ "$branch" = "main" ]; then
            echo "dir=terraform/environments/prod" >> "$GITHUB_OUTPUT"
            echo "role_arn=${{ env.PROD_ROLE_ARN }}" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Could not determine environment for branch '$branch'"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.env.outputs.role_arn }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Terragrunt
        run: |
          curl -Lo /usr/local/bin/terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64"
          chmod +x /usr/local/bin/terragrunt

      # Per-unit, not `run --all`: confirmed empirically (both against a
      # live prod cluster and locally) that `run --all plan` substitutes
      # mock dependency outputs for any unit that's part of the same batch
      # as its dependency (here: eks), even when that dependency has real,
      # already-applied state — breaking the kubectl/helm provider config
      # for nodepools/vpn/argocd/eso every time, regardless of whether the
      # cluster actually exists. A standalone `terragrunt plan` inside each
      # unit's own directory reads real dependency state correctly instead.
      - name: Terragrunt plan (per unit)
        working-directory: ${{ steps.env.outputs.dir }}
        env:
          # Same value the personal `access_entries.personal` entry needs
          # (see modules/eks) — without it, a plan run would show this
          # entry being destroyed, since the CI role has no way to know it
          # otherwise. Secret, not a plain repo variable: pairs the account
          # ID with a personal IAM username (see README Prerequisites).
          ADMIN_PRINCIPAL_ARN: ${{ secrets.ADMIN_PRINCIPAL_ARN }}
          # TEMPORARY — debugging why dependencies show "has no outputs" in
          # CI specifically (rules out: bucket policy — none exists; stale
          # cache — a clean local cache reads real state fine). Remove once
          # root cause is found.
          TG_LOG: debug
        run: |
          status=0
          for unit in */; do
            unit="${unit%/}"
            if [ -f "$unit/terragrunt.hcl" ]; then
              echo "::group::terragrunt plan - $unit"
              (cd "$unit" && terragrunt plan --non-interactive) || status=1
              echo "::endgroup::"
            fi
          done
          exit $status

  apply:
    needs: plan
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.plan.outputs.role_arn }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Terragrunt
        run: |
          curl -Lo /usr/local/bin/terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64"
          chmod +x /usr/local/bin/terragrunt

      - name: Terragrunt apply
        working-directory: ${{ needs.plan.outputs.dir }}
        env:
          ADMIN_PRINCIPAL_ARN: ${{ secrets.ADMIN_PRINCIPAL_ARN }}
        run: terragrunt run --all --non-interactive -- apply -auto-approve
