name: Bootstrap Prod

# Manual, main-branch-only, apply with no preceding plan step — same
# reasoning as bootstrap-shared.yml: a plan against a torn-down environment
# fails on real AWS lookups in kubectl/helm-dependent units, while a full
# `apply` resolves fine in dependency order. Once prod is up, use the
# regular terraform.yml workflow (plan-checked PRs + its own
# workflow_dispatch apply) for ongoing changes.
on:
  workflow_dispatch: {}

permissions:
  id-token: write # required for AWS OIDC federation
  contents: read

env:
  TERRAFORM_VERSION: "1.15.7"
  TERRAGRUNT_VERSION: "1.0.8"
  AWS_REGION: "us-east-1"

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Fail closed on any branch but main
        run: |
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "::error::bootstrap-prod must be dispatched from the main branch (got '${{ github.ref_name }}')"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "arn:aws:iam::221556121262:role/chess-prod-cicd"
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Terragrunt
        run: |
          curl -Lo /usr/local/bin/terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64"
          chmod +x /usr/local/bin/terragrunt

      - name: Terragrunt apply --all
        working-directory: terraform/environments/prod
        env:
          ADMIN_PRINCIPAL_ARN: ${{ secrets.ADMIN_PRINCIPAL_ARN }}
        run: terragrunt run --all --non-interactive -- apply -auto-approve
